<nav class="navbar">
    <div class="nav-container">
        <a class="nav-brand" routerLink="/dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="28" height="28">
                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                <path d="M2 17l10 5 10-5" />
                <path d="M2 12l10 5 10-5" />
            </svg>
            <span>BiomechanicalApp</span>
        </a>

        <div class="nav-links" [class.open]="isMenuOpen">
            @for (item of visibleNavItems; track item.route) {
            <a class="nav-link" [routerLink]="item.route" routerLinkActive="active" (click)="isMenuOpen = false">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
                    <path [attr.d]="item.icon" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span>{{ item.label }}</span>
            </a>
            }
        </div>

        <div class="nav-user">
            <button class="user-button" (click)="toggleMenu()">
                <div class="user-avatar">{{ userInitials }}</div>
                <div class="user-info">
                    <span class="user-name">{{ currentUser?.firstName }}</span>
                    <span class="user-role">{{ roleLabel }}</span>
                </div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"
                    [class.rotated]="isMenuOpen">
                    <path d="M6 9l6 6 6-6" />
                </svg>
            </button>

            @if (isMenuOpen) {
            <div class="dropdown-menu">
                <a class="dropdown-item" routerLink="/profile" (click)="isMenuOpen = false">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16"
                        height="16">
                        <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    Profile
                </a>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item logout" (click)="logout()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16"
                        height="16">
                        <path
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Log out
                </button>
            </div>
            }
        </div>

        <button class="hamburger" (click)="toggleMenu()">
            <span [class.open]="isMenuOpen"></span>
            <span [class.open]="isMenuOpen"></span>
            <span [class.open]="isMenuOpen"></span>
        </button>
    </div>
</nav>
